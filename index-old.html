<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار رياضيات - الصف السادس الابتدائي - الفصل الدراسي الثاني v2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
    :root {
      --primary:#1a6b3c;--primary-light:#2e9e5e;--accent:#f5a623;
      --bg:#f0f7f4;--card-bg:#ffffff;--text:#1e2d24;--text-muted:#5a7a68;
      --correct:#1a6b3c;--wrong:#c0392b;--correct-bg:#d4edda;--wrong-bg:#fde8e6;
      --border:#c8e6d4;--shadow:0 4px 20px rgba(26,107,60,0.10);--radius:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
    .site-header{background:linear-gradient(135deg,#0d4f2b 0%,#1a6b3c 50%,#2e9e5e 100%);color:#fff;padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;}
    .site-header::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:rgba(255,255,255,0.07);border-radius:50%;}
    .site-header::after{content:'';position:absolute;bottom:-80px;right:-40px;width:260px;height:260px;background:rgba(255,255,255,0.05);border-radius:50%;}
    .header-icon{font-size:44px;margin-bottom:8px;display:block;}
    .site-header h1{font-size:clamp(18px,4vw,26px);font-weight:900;letter-spacing:0.5px;line-height:1.4;}
    .site-header .subtitle{margin-top:6px;font-size:13px;opacity:0.82;font-weight:500;}
    .version-badge{display:inline-block;background:rgba(255,255,255,0.22);border:1.5px solid rgba(255,255,255,0.45);padding:4px 16px;border-radius:50px;font-size:13px;font-weight:800;margin-top:10px;}
    .container{max-width:820px;margin:0 auto;padding:0 16px;}
    .student-box{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 28px;margin:24px 0 0;border:2px solid var(--border);}
    .student-box label{display:block;font-weight:700;font-size:15px;margin-bottom:8px;color:var(--primary);}
    .student-box input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;transition:all 0.2s;}
    .student-box input:focus{border-color:var(--primary-light);background:#fff;}
    .instructions{background:linear-gradient(135deg,#e8f5ee,#d0ede0);border-radius:var(--radius);padding:20px 24px;margin:18px 0 0;border-right:5px solid var(--primary);}
    .instructions h3{font-size:15px;font-weight:800;color:var(--primary);margin-bottom:10px;}
    .instructions ul{list-style:none;padding:0;}
    .instructions ul li{font-size:13.5px;color:var(--text);padding:4px 0;padding-right:20px;position:relative;font-weight:500;}
    .instructions ul li::before{content:'✓';position:absolute;right:0;color:var(--primary-light);font-weight:900;}
  </style>
</head>
<body>
<header class="site-header">
  <span class="header-icon">📐</span>
  <h1>اختبار رياضيات - الصف السادس</h1>
  <p class="subtitle">هذا الملف تم دمجه مع الصفحة الرئيسية</p>
</header>
<div class="container">
  <div class="student-box">
    <h2>تم دمج هذا الاختبار مع الصفحة الرئيسية الجديدة</h2>
    <p style="margin-top: 20px; font-size: 16px; text-align: center;">
      🏠 <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">اذهب إلى الصفحة الرئيسية</a>
    </p>
  </div>
</div>
</body>
</html>
